{% extends 'base.html' %}

{% block content %}

<style>
.container {
    max-width: 700px;
    margin: auto;
}

.card {
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-top: 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

label {
    font-weight: 600;
    margin-top: 10px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

textarea {
    resize: vertical;
}

button {
    width: 100%;
    background: #4CAF50;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #45a049;
}

.option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
</style>

<div class="container">

<h2>Add Question</h2>

<div class="card">

<form method="POST">

{% csrf_token %}

<label>Select Question Bank</label>

<select name="bank">
    {% for bank in banks %}
        <option value="{{bank.id}}">{{bank.title}}</option>
    {% endfor %}
</select>

<label>Question</label>
<textarea name="question" rows="3" placeholder="Enter your question..."></textarea>

<label>Options</label>
<div class="option-grid">
    <input name="a" placeholder="Option A">
    <input name="b" placeholder="Option B">
    <input name="c" placeholder="Option C">
    <input name="d" placeholder="Option D">
</div>

<label>Correct Option</label>
<input name="correct" placeholder="Enter A / B / C / D">

<label>Explanation</label>
<textarea name="explanation" rows="3" placeholder="Optional explanation..."></textarea>

<button type="submit">💾 Save Question</button>

</form>

</div>

</div>

{% endblock %}
