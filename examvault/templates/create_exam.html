{% extends "base.html" %}

{% block content %}

<style>
.container {
    max-width: 850px;
    margin: auto;
}

/* 🔥 CARD */
.card {
    background: #ffffff;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    margin-top: 20px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
}

/* 🔥 TITLE */
h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* 🔥 FORM ELEMENTS */
label {
    font-weight: 600;
    display: block;
    margin-top: 10px;
}

select, input[type="text"] {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #dcdcdc;
    font-size: 14px;
    transition: 0.2s;
}

select:focus, input:focus {
    border-color: #4CAF50;
    outline: none;
}

/* 🔥 QUESTION BOX */
.question-box {
    border: 1px solid #e5e7eb;
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 12px;
    transition: 0.2s;
    cursor: pointer;
}

.question-box:hover {
    background: #f9fafb;
    border-color: #4CAF50;
}

/* checkbox spacing */
.question-box input {
    margin-right: 8px;
}

/* 🔥 BUTTON */
button {
    background: linear-gradient(135deg, #4CAF50, #43a047);
    color: white;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
    transition: 0.2s;
}

button:hover {
    background: linear-gradient(135deg, #43a047, #388e3c);
    transform: scale(1.02);
}

/* 🔥 EMPTY TEXT */
.empty-text {
    color: #888;
    text-align: center;
    padding: 10px;
}

/* 🔥 SECTION TITLE */
h3 {
    margin-top: 20px;
}

/* 🔥 DIVIDER */
.divider {
    height: 1px;
    background: #eee;
    margin: 20px 0;
}
</style>

<div class="container">

<h2>📝 Create Exam</h2>

<!-- 🔥 SELECT BANK -->
<div class="card">
<form method="GET">
    <label>📚 Select Question Bank</label>

    <select name="bank" onchange="this.form.submit()">
        <option value="">-- Select Bank --</option>

        {% for b in banks %}
            <option value="{{ b.id }}">
                {{ b.title }}
            </option>
        {% endfor %}
    </select>
</form>
</div>

<!-- 🔥 EXAM FORM -->
<div class="card">
<form method="POST">
    {% csrf_token %}

    <label>📌 Exam Title</label>
    <input type="text" name="title" placeholder="Enter exam title..." required>

    <div class="divider"></div>

    <h3>📖 Select Questions</h3>

    {% for q in questions %}
        <div class="question-box">
            <input type="checkbox" name="questions" value="{{ q.id }}">
            {{ q.question_text }}
        </div>
    {% empty %}
        <p class="empty-text">Select a question bank first</p>
    {% endfor %}

    <br>
    <button type="submit">🚀 Create Exam</button>
</form>
</div>

</div>

{% endblock %}
