{% extends "base.html" %}

{% block content %}

<h2>Available Exams</h2>

{% for exam in exams %}

<div class="exam-card">

    <h3>{{ exam.title }}</h3>
    <p>Total Questions: {{ exam.total_questions }}</p>

    <!-- 🔥 FINAL WORKING BUTTON -->
    <form action="/exam/start/{{ exam.id }}/" method="GET">
        <button type="submit" class="start-btn">Start Exam</button>
    </form>

</div>

{% endfor %}

{% endblock %}
