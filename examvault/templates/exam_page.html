{% extends "base.html" %}

{% block content %}

<h2>{{exam.title}}</h2>

<form method="POST" action="/exam/submit/{{attempt.id}}/">

{% csrf_token %}

{% for q in questions %}

<div class="question-box">

<p><b>{{forloop.counter}}. {{q.question_text}}</b></p>

<div class="option">
<input type="radio" name="{{q.id}}" value="A"> {{q.option_a}}
</div>

<div class="option">
<input type="radio" name="{{q.id}}" value="B"> {{q.option_b}}
</div>

<div class="option">
<input type="radio" name="{{q.id}}" value="C"> {{q.option_c}}
</div>

<div class="option">
<input type="radio" name="{{q.id}}" value="D"> {{q.option_d}}
</div>

</div>

{% endfor %}

<button class="btn">Submit Exam</button>

</form>

{% endblock %}
