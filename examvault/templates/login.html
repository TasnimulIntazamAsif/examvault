{% load static %}

<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>ExamVault Login</title>

<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<style>

/* 🔥 BACKGROUND */
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4CAF50, #2e7d32);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🔥 CONTAINER */
.auth-container {
    width: 100%;
    display: flex;
    justify-content: center;
}

/* 🔥 CARD */
.auth-card {
    background: white;
    padding: 30px;
    width: 350px;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    text-align: center;
}

/* 🔥 TITLE */
.auth-card h2 {
    margin-bottom: 20px;
}

/* 🔥 FORM GROUP */
.form-group {
    text-align: left;
    margin-bottom: 15px;
}

.form-group label {
    font-weight: bold;
    font-size: 14px;
}

/* 🔥 INPUT */
.form-group input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.2s;
}

.form-group input:focus {
    border-color: #4CAF50;
    outline: none;
}

/* 🔥 BUTTON */
.auth-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: linear-gradient(135deg, #4CAF50, #43a047);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.auth-btn:hover {
    background: linear-gradient(135deg, #43a047, #2e7d32);
    transform: scale(1.03);
}

/* 🔥 LINK */
.auth-link {
    margin-top: 15px;
    font-size: 14px;
}

.auth-link a {
    color: #4CAF50;
    text-decoration: none;
    font-weight: bold;
}

.auth-link a:hover {
    text-decoration: underline;
}

</style>

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h2>🔐 Login to ExamVault</h2>

<form method="POST">

{% csrf_token %}

<div class="form-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button class="auth-btn">🚀 Login</button>

<p class="auth-link">
Don't have an account?
<a href="/register/">Register here</a>
</p>

</form>

</div>

</div>

</body>
</html>
