{% extends "base.html" %}

{% block content %}

<h2>Questions</h2>

{% for q in questions %}

<div class="question-box">

<p><b>{{q.question_text}}</b></p>

<ul>
<li>A: {{q.option_a}}</li>
<li>B: {{q.option_b}}</li>
<li>C: {{q.option_c}}</li>
<li>D: {{q.option_d}}</li>
</ul>

</div>

{% endfor %}

{% endblock %}
