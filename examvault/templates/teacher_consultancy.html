{% extends "base.html" %}

{% block content %}

<style>

/* 🔥 TITLE */
h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* 🔥 GRID */
.consult-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* 🔥 CARD */
.consult-card {
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    text-align: center;
    transition: 0.2s;
}

.consult-card:hover {
    transform: translateY(-5px);
}

/* 🔥 ICON */
.icon {
    font-size: 35px;
    margin-bottom: 10px;
}

/* 🔥 TEXT */
.consult-card h3 {
    margin-bottom: 10px;
}

.consult-card p {
    color: #555;
    margin-bottom: 15px;
}

/* 🔥 BUTTON */
.btn {
    display: inline-block;
    padding: 10px 16px;
    background: linear-gradient(135deg, #4CAF50, #43a047);
    color: white;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.2s;
}

.btn:hover {
    background: linear-gradient(135deg, #43a047, #2e7d32);
}

</style>

<h2>👨‍🏫 Teacher Consultancy</h2>

<div class="consult-grid">

    <!-- CHAT -->
    <div class="consult-card">
        <div class="icon">💬</div>
        <h3>Chat with Teacher</h3>
        <p>Get help directly from teachers</p>
        <a href="#" class="btn">Start Chat</a>
    </div>

    <!-- EXAM -->
    <div class="consult-card">
        <div class="icon">📝</div>
        <h3>Sit for Exam</h3>
        <p>Take exams created by teachers</p>
        <a href="{% url 'exam_list' %}" class="btn">Start Exam</a>
    </div>

</div>

{% endblock %}
