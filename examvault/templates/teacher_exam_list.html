{% extends "base.html" %}

{% block content %}

<h2>Teacher Exam Dashboard</h2>

<!-- ✅ Create Exam Button -->
<a href="{% url 'create_exam' %}" style="display:inline-block; margin-bottom:15px;">
    ➕ Create New Exam
</a>

<table border="1" cellpadding="10" cellspacing="0" width="100%">
    <tr>
        <th>Exam Title</th>
        <th>Total Questions</th>
        <th>Action</th>
    </tr>

    {% for exam in exams %}
    <tr>
        <td>{{ exam.title }}</td>

        <!-- ✅ Safe count -->
        <td>{{ exam.questions.count }}</td>

        <td>
            <!-- Preview -->
            <a href="{% url 'start_exam' exam.id %}">▶ Preview</a>
        </td>
    </tr>

    {% empty %}
    <tr>
        <td colspan="3" style="text-align:center;">
            No exams created yet ❌
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
